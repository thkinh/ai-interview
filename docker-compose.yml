services:
  chroma:
    image: chromadb/chroma
    ports:
      - "15000:8000"
    volumes:
      - chroma_data:/data

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

        #tts:
        #  image: ghcr.io/coqui-ai/tts
        #  ports:
        #    - "5002:5002"
        #  entrypoint: >
        #    python3 TTS/server/server.py
        #    --model_name tts_models/en/vctk/vits
        #    --use_cuda true
        #  deploy:
        #    resources:
        #      reservations:
        #        devices:
        #          - capabilities: [gpu]

  be:
    image: thkinh/ai-interview:1.1.0
    ports:
      - "16000:16000"
    depends_on:
      - chroma
      - ollama
    environment:
      MODEL_NAME: llama3.2:latest   
      TTS_URL: http://tts:5002/api/tts
      OLLAMA_HOST: http://ollama:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"          
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "16000"

volumes:
  chroma_data:
  ollama_data:
